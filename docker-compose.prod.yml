version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventoryflow
      POSTGRES_USER: inventoryflow
      POSTGRES_PASSWORD: inventoryflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      target: prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://inventoryflow:inventoryflow@postgres:5432/inventoryflow?schema=public
      PORT: 3001
      JWT_ACCESS_SECRET: change_me
      JWT_REFRESH_SECRET: change_me
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_BASE_URL: http://localhost:3001
    environment:
      # Build-time env is handled by Vite; runtime is static.
      # Keep API base url consistent with external access.
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:

