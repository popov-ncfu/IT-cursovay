version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventoryflow
      POSTGRES_USER: inventoryflow
      POSTGRES_PASSWORD: inventoryflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://inventoryflow:inventoryflow@postgres:5432/inventoryflow?schema=public
      PORT: 3000
      JWT_ACCESS_SECRET: change_me
      JWT_REFRESH_SECRET: change_me
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:

