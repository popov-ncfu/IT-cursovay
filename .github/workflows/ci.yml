name: CI

on:
  push:
  pull_request:

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgres://inventoryflow:inventoryflow@localhost:5432/inventoryflow?schema=public
        run: npx prisma generate
      - name: Backend lint
        working-directory: backend
        run: npm run lint

  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgres://inventoryflow:inventoryflow@localhost:5432/inventoryflow?schema=public
        run: npx prisma generate
      - name: Backend unit tests
        working-directory: backend
        run: npm test

  backend-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: inventoryflow
          POSTGRES_USER: inventoryflow
          POSTGRES_PASSWORD: inventoryflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U inventoryflow -d inventoryflow"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgres://inventoryflow:inventoryflow@localhost:5432/inventoryflow?schema=public
        run: npx prisma generate
      - name: Prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgres://inventoryflow:inventoryflow@localhost:5432/inventoryflow?schema=public
        run: npx prisma migrate deploy
      - name: Backend e2e tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://inventoryflow:inventoryflow@localhost:5432/inventoryflow?schema=public
          JWT_ACCESS_SECRET: test_access_secret
          JWT_REFRESH_SECRET: test_refresh_secret
        run: npm run test:e2e

  frontend-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Frontend tests
        working-directory: frontend
        run: npm test
      - name: Frontend build
        working-directory: frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-unit
      - backend-e2e
      - frontend-test-build
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build --target prod -t inventoryflow-backend ./backend
      - name: Build frontend image
        run: docker build --target prod --build-arg VITE_API_BASE_URL=http://localhost:3001 -t inventoryflow-frontend ./frontend

