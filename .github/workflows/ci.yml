    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Placeholder lint
        run: echo "TODO: add lint checks"

  unit:
    runs-on: ubuntu-latest
    steps:
