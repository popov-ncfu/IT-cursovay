      - name: Placeholder unit tests
        run: echo "TODO: add unit tests"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder e2e tests
        run: echo "TODO: add e2e tests"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder build
        run: echo "TODO: add frontend/backend build steps"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t inventoryflow-backend ./backend
      - name: Build frontend image
        run: docker build -t inventoryflow-frontend ./frontend

